backend:
  name: gitlab  # o 'github' si migras a GitHub
  repo: RuthNoemiCorrea/gitanos-con-suerte  # cambia a tu usuario/repo exacto
  branch: main  # o master, la rama principal

publish_mode: editorial_workflow  # opcional, para revisiones

media_folder: "imágenes"  # donde se guardan las imágenes subidas
public_folder: "/imágenes"

collections:
  - name: "sorteos"
    label: "Sorteos"
    folder: "_datos/sorteos"  # o donde guardes los .md de sorteos
    create: true
    slug: "{{fecha}}-{{titulo}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descripción", name: "description", widget: "markdown"}
      - {label: "Fecha/Hora", name: "fecha", widget: "datetime"}
      - {label: "Imagen principal", name: "imagen", widget: "image"}
      - {label: "Estado", name: "estado", widget: "select", options: ["Próximo", "Activo", "Finalizado"]}
      - {label: "Premio", name: "premio", widget: "string"}
      - {label: "Enlace de participación", name: "enlace", widget: "string"}
      - {label: "Categoría", name: "categoria", widget: "string", default: "Sorteo"}

  - name: "eventos"
    label: "Eventos Sociales"
    folder: "_datos/eventos-sociales"  # ajusta a tu carpeta
    create: true
    slug: "{{fecha}}-{{titulo}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descripción", name: "description", widget: "markdown"}
      - {label: "Fecha/Hora", name: "fecha", widget: "datetime"}
      - {label: "Imagen", name: "imagen", widget: "image"}
      - {label: "Enlace", name: "enlace", widget: "string"}
      # Agrega más campos si necesitas

  # Puedes agregar más colecciones para "viajes.md", etc.
